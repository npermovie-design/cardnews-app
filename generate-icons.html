<!DOCTYPE html>
<html>
<head><title>PWA Icon Generator</title></head>
<body style="padding:40px;font-family:sans-serif;background:#1a1a2e;color:#fff">
<h2>SNS메이킷 앱 아이콘 생성기</h2>
<p>아래 버튼을 클릭하면 PNG 아이콘이 자동 다운로드됩니다.</p>

<div style="display:flex;gap:20px;margin:30px 0">
  <div>
    <canvas id="c512" width="512" height="512" style="width:128px;height:128px;border-radius:20px"></canvas>
    <p>512x512</p>
  </div>
  <div>
    <canvas id="c192" width="192" height="192" style="width:96px;height:96px;border-radius:16px"></canvas>
    <p>192x192</p>
  </div>
</div>

<button onclick="download(512)" style="padding:12px 24px;border-radius:10px;border:none;background:#7c6aff;color:#fff;font-size:16px;cursor:pointer;margin-right:10px">
  512x512 다운로드
</button>
<button onclick="download(192)" style="padding:12px 24px;border-radius:10px;border:none;background:#ec4899;color:#fff;font-size:16px;cursor:pointer">
  192x192 다운로드
</button>

<script>
function drawIcon(size) {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');

  // 배경 그라데이션 (둥근 모서리)
  const r = size * 0.18;
  const g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, '#7c6aff');
  g.addColorStop(1, '#ec4899');

  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.fill();

  // 텍스트 "N"
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 ' + (size * 0.52) + 'px "Arial Black", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', size / 2, size / 2 + size * 0.03);
}

drawIcon(512);
drawIcon(192);

function download(size) {
  const c = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = c.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
