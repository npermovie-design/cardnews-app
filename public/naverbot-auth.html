<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메이킷 SNS 자동화 로그인</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI",
                   "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fafafa;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid #f0f1f4;
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }
    .sub {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.4px;
    }
    .desc {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      background: #3b82f6;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }
    .btn:hover { background: #2563eb; }
    .btn-google {
      background: #fff;
      color: #111827;
      border: 1px solid #e5e7eb;
    }
    .btn-google:hover { background: #f9fafb; border-color: #d1d5db; }
    .btn-outline {
      background: #eff6ff;
      color: #3b82f6;
    }
    .btn-outline:hover { background: #dbeafe; }
    .g-icon {
      width: 18px;
      height: 18px;
    }
    .form-group { margin-top: 12px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px #dbeafe;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0 12px;
      color: #9ca3af;
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider span { padding: 0 12px; }
    .checkmark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #d1fae5;
      color: #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
    }
    .error {
      background: #fef2f2;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }
    .loading {
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
      padding: 40px 0;
    }
    .user-info {
      background: #f8f9fb;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-email { font-size: 11px; color: #6b7280; margin-top: 2px; }
    a { color: #ef4f5f; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="loading">로그인 상태 확인 중...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "__SUPABASE_URL__";
    const SUPABASE_ANON_KEY = "__SUPABASE_ANON_KEY__";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
      },
    });

    const card = document.getElementById("card");
    const LOOPBACK_CALLBACK = "http://127.0.0.1:54321/callback";

    function esc(s) {
      return String(s || "").replace(/[&<>"']/g, c =>
        ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
    }

    function buildCallbackUrl(session) {
      const u = new URL(LOOPBACK_CALLBACK);
      u.searchParams.set("access_token", session.access_token);
      if (session.refresh_token) u.searchParams.set("refresh_token", session.refresh_token);
      u.searchParams.set("email", session.user.email || "");
      u.searchParams.set("uid", session.user.id || "");
      u.searchParams.set("expires_at", String(session.expires_at || ""));
      return u.toString();
    }

    function showLoggedIn(session) {
      const user = session.user;
      const nick = (user.user_metadata?.full_name || user.email || "").split("@")[0];
      const email = user.email || "";
      const avatar = (nick.charAt(0) || "?").toUpperCase();
      const callbackUrl = buildCallbackUrl(session);

      card.innerHTML = `
        <div class="checkmark">✓</div>
        <h1>로그인 완료</h1>
        <div class="desc">앱으로 자동 이동합니다...</div>
        <div class="user-info">
          <div class="avatar">${esc(avatar)}</div>
          <div>
            <div class="user-name">${esc(nick)}</div>
            <div class="user-email">${esc(email)}</div>
          </div>
        </div>
        <button class="btn" id="openAppBtn">앱으로 이동</button>
        <button class="btn btn-outline" id="logoutBtn">다른 계정으로 로그인</button>
      `;
      document.getElementById("openAppBtn").onclick = () => {
        window.location.href = callbackUrl;
      };
      document.getElementById("logoutBtn").onclick = async () => {
        await client.auth.signOut();
        showLogin();
      };

      // 자동 리다이렉트 (0.8초 후)
      setTimeout(() => { window.location.href = callbackUrl; }, 800);
    }

    function showLogin(errMsg) {
      card.innerHTML = `
        <div class="logo">메이킷 SNS 자동화</div>
        <div class="sub">snsmakeit.com</div>
        <h1>로그인</h1>
        <div class="desc">월/연간 구독자는 로그인 시 바로 이용 가능합니다</div>
        <button class="btn btn-google" id="googleBtn">
          <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google로 계속하기
        </button>
        <div class="divider"><span>또는</span></div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" id="emailBtn">이메일로 로그인</button>
        <div class="error" id="err">${errMsg ? esc(errMsg) : ""}</div>
        <div style="text-align:center;margin-top:16px;font-size:12px;color:#6b7280;">
          아직 구독 전이면 <a href="https://snsmakeit.com/pricing" target="_blank">여기서 구독</a>하세요
        </div>
      `;
      if (errMsg) document.getElementById("err").style.display = "block";

      document.getElementById("googleBtn").onclick = async () => {
        try {
          const { error } = await client.auth.signInWithOAuth({
            provider: "google",
            options: {
              redirectTo: LOOPBACK_CALLBACK,
              queryParams: { prompt: "select_account" },
            },
          });
          if (error) throw error;
        } catch (e) {
          showLogin(e.message || "Google 로그인 실패");
        }
      };

      document.getElementById("emailBtn").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const pw = document.getElementById("pw").value;
        if (!email || !pw) return showLogin("이메일과 비밀번호를 입력하세요");
        try {
          const { data, error } = await client.auth.signInWithPassword({ email, password: pw });
          if (error) throw error;
          showLoggedIn(data.session);
        } catch (e) {
          showLogin(e.message || "로그인 실패");
        }
      };
    }

    async function init() {
      // OAuth 리다이렉트 후 hash 처리
      const { data: { session } } = await client.auth.getSession();
      if (session) {
        showLoggedIn(session);
      } else {
        showLogin();
      }
    }

    init();
  </script>
</body>
</html>
