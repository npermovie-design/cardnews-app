name: Build Mac
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: naverbot-desktop/electron

      - run: npm run build:mac
        working-directory: naverbot-desktop/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create DMGs
        run: |
          cd naverbot-desktop/electron/dist
          for dir in mac mac-arm64; do
            if [ -d "$dir" ]; then
              APP=$(find "$dir" -name "*.app" -maxdepth 1 | head -1)
              if [ -n "$APP" ]; then
                ARCH=$([ "$dir" = "mac-arm64" ] && echo "-arm64" || echo "-intel")
                STAGE="stage-${dir}"
                rm -rf "$STAGE"
                mkdir -p "$STAGE"
                cp -R "$APP" "$STAGE/"
                cp ../build/install-mac.sh "$STAGE/설치하기.command"
                chmod +x "$STAGE/설치하기.command"
                hdiutil create -volname "메이킷 SNS자동화" \
                  -srcfolder "$STAGE" -ov -format UDZO \
                  "makeit-sns-setup${ARCH}.dmg"
                rm -rf "$STAGE"
                echo "Created: makeit-sns-setup${ARCH}.dmg"
              fi
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: naverbot-desktop/electron/dist/makeit-sns-setup-*.dmg
